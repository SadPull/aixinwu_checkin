name: 爱心屋签到

on:
  workflow_dispatch:
  schedule:
    # 北京时间约 09:13 与 17:13 各一次（避开整点，降低排队延迟）
    - cron: '13 1 * * *'
    - cron: '13 9 * * *'

concurrency:
  group: aixinwu-checkin
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 配置 Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装依赖
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: 执行签到
        env:
          AIXINWU_USERNAME: ${{ secrets.AIXINWU_USERNAME }}
          AIXINWU_PASSWORD: ${{ secrets.AIXINWU_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python aixinwu.py
