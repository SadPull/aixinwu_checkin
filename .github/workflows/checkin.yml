name: 爱心屋签到

on:
  workflow_dispatch:
  schedule:
    # 北京时间约 09:13 与 17:13 各一次（避开整点，降低排队延迟）
    - cron: '13 1 * * *'
    - cron: '13 9 * * *'

concurrency:
  group: aixinwu-checkin
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: 检出源码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 配置 Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装依赖
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: 执行签到
        env:
          AIXINWU_USERNAME: ${{ secrets.AIXINWU_USERNAME }}
          AIXINWU_PASSWORD: ${{ secrets.AIXINWU_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python aixinwu.py
